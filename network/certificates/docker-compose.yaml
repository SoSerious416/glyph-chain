networks:
  glyph_network:
    name: glyph_network
    driver: bridge

services:
  orderer0.glyphchain.local:
    image: hyperledger/fabric-orderer:2.4
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/etc/hyperledger/fabric/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_GENERAL_BOOTSTRAPFILE=
      # TLS Configurations
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/etc/hyperledger/fabric/tls/orderer0.key.pem
      - ORDERER_GENERAL_TLS_CERTIFICATE=/etc/hyperledger/fabric/tls/orderer0.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=/etc/hyperledger/fabric/tls/intermediate-chain.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/etc/hyperledger/fabric/tls/orderer0.key.pem
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/etc/hyperledger/fabric/tls/orderer0.crt
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=/etc/hyperledger/fabric/tls/intermediate-chain.crt
      # Channel Configuration
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      # Admin TLS Configurations
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/etc/hyperledger/fabric/tls/orderer0.key.pem
      - ORDERER_ADMIN_TLS_CERTIFICATE=/etc/hyperledger/fabric/tls/orderer0.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=/etc/hyperledger/fabric/tls/intermediate-chain.crt
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=/etc/hyperledger/fabric/tls/intermediate-chain.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./components/orderer0/msp:/etc/hyperledger/fabric/msp
      - ./components/orderer0/msp/admincerts/admin.crt:/etc/hyperledger/fabric/tls/admin.crt
      - ./components/orderer0/msp/signcerts/orderer0.crt:/etc/hyperledger/fabric/tls/orderer0.crt
      - ./components/orderer0/msp/keystore/orderer0.key.pem:/etc/hyperledger/fabric/tls/orderer0.key.pem
      - ./components/orderer0/msp/cacerts/intermediate-chain.crt:/etc/hyperledger/fabric/tls/intermediate-chain.crt
      - ./components/orderer0/genesis.block:/etc/hyperledger/fabric/genesisblock
      - ~/go/src/github.com/hyperledger/fabric-samples/bin/osnadmin:/usr/local/bin/osnadmin_host
    ports:
      - 7050:7050
      - 9443:9443
    networks:
      - glyph_network

  peer0.glyphchain.local:
    image: hyperledger/fabric-peer:2.4
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=glyph_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      # Node Identity
      - CORE_PEER_ID=peer0.glyphchain.local
      - CORE_PEER_ADDRESS=peer0.glyphchain.local:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.glyphchain.local:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_LOCALMSPID=GlyphOrgMSP
      # TLS Paths inside container
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/peer0.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/peer0.key.pem
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/intermediate-chain.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./components/peer0/msp:/etc/hyperledger/fabric/msp
      - ./components/peer0/msp/admincerts/admin.crt:/etc/hyperledger/fabric/tls/admin.crt
      - ./components/peer0/msp/signcerts/peer0.crt:/etc/hyperledger/fabric/tls/peer0.crt
      - ./components/peer0/msp/keystore/peer0.key.pem:/etc/hyperledger/fabric/tls/peer0.key.pem
      - ./components/peer0/msp/cacerts/intermediate-chain.crt:/etc/hyperledger/fabric/tls/intermediate-chain.crt
      - ./components/orderer0/genesis.block:/etc/hyperledger/fabric/genesisblock
    ports:
      - 7051:7051
    networks:
      - glyph_network

  # THE ADMINISTRATIVE CONTROL CENTER CONTAINER
  cli:
    image: hyperledger/fabric-tools:2.4
    container_name: cli
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      
      # Target peer0 node
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.glyphchain.local:7051
      - CORE_PEER_LOCALMSPID=GlyphOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      
      # 🚀 THE CRITICAL FIX: Set the configuration path to the container's native templates
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      
      # 🚀 IDENTITY SETTINGS: Point directly to peer0's mounted administrative MSP structure
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/components/peer0/msp
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/components/peer0/msp/signcerts/peer0.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/components/peer0/msp/keystore/peer0.key.pem
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/components/peer0/msp/cacerts/intermediate-chain.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/:/host/var/run/
      - ./:/opt/gopath/src/github.com/hyperledger/fabric/peer/
    networks:
      - glyph_network