server {
    listen 80;
    server_name cdp.glyphchain.local;

    # Directory where the Windows CA will publish the .crl file
    location /crl {
        alias /var/www/crl/;
        autoindex on;                          # Allows viewing the file list for debugging
        add_header Cache-Control "no-cache";   # Forces nodes to always pull the freshest blacklist
        types {
            application/pkix-crl crl;
        }
    }

    # Health check endpoint for the network routers
    location /health {
        return 200 'CDP Server Online\n';
        add_header Content-Type text/plain;
    }
}